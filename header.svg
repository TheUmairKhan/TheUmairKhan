<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" width="100%" height="100%" role="img" aria-label="Umair Khan — Software Engineer @ Micron">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#070a12" />
      <stop offset="100%" stop-color="#04060b" />
    </linearGradient>

    <pattern id="gridLines" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#101a28" stroke-width="0.5" opacity="0.35" />
    </pattern>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .cursor {
        animation: blink 1.1s steps(1) infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .wave {
        stroke-dasharray: 90, 360;
        animation: flow 4s linear infinite;
      }
      @keyframes flow {
        to { stroke-dashoffset: -450; }
      }
      .pulse {
        animation: pulse 2.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.25; }
        50% { opacity: 1; }
      }
      .tag-blink {
        animation: blink 1.8s steps(1) infinite;
      }
    </style>
  </defs>

  <rect width="840" height="400" fill="url(#bg)" />
  <rect width="840" height="400" fill="url(#gridLines)" />

  <!-- corner brackets -->
  <path d="M 16 44 L 16 16 L 44 16" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.8" />
  <path d="M 796 16 L 824 16 L 824 44" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.8" />
  <path d="M 824 356 L 824 384 L 796 384" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.8" />
  <path d="M 44 384 L 16 384 L 16 356" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.8" />

  <!-- status chip -->
  <g transform="translate(56, 34)">
    <circle cx="0" cy="-3" r="3" fill="#ff2d95" />
    <circle class="pulse" cx="0" cy="-3" r="5.5" fill="none" stroke="#ff2d95" stroke-width="1" />
    <text class="mono" x="14" y="0" font-size="10" fill="#ff2d95" letter-spacing="2">SYS.ONLINE</text>
  </g>

  <!-- neural waveform -->
  <g transform="translate(520, 24)">
    <path class="wave" d="M 0 24 L 28 24 L 36 12 L 44 36 L 52 8 L 60 38 L 68 24 L 110 24 L 120 16 L 130 32 L 140 24 L 182 24 L 190 10 L 198 38 L 206 6 L 214 36 L 222 24 L 264 24"
          fill="none" stroke="#ff2d95" stroke-width="1.5" opacity="0.9" />
    <path d="M 0 24 L 28 24 L 36 12 L 44 36 L 52 8 L 60 38 L 68 24 L 110 24 L 120 16 L 130 32 L 140 24 L 182 24 L 190 10 L 198 38 L 206 6 L 214 36 L 222 24 L 264 24"
          fill="none" stroke="#ff2d95" stroke-width="1.5" opacity="0.15" />
  </g>

  <!-- name -->
  <text class="mono" x="54" y="100" font-size="46" font-weight="bold" fill="#eaf3ff" letter-spacing="2">UMAIR KHAN<tspan class="cursor" fill="#00e5ff">▍</tspan></text>
  <text class="mono" x="56" y="128" font-size="12.5" fill="#7d8fa8" letter-spacing="2">&gt; SOFTWARE ENGINEER @ MICRON</text>

  <!-- panel: anime -->
  <g transform="translate(56, 162)">
    <rect width="224" height="160" fill="#0a0e17" stroke="#1c2a3d" stroke-width="1" />
    <rect width="224" height="26" fill="#0e1420" stroke="#1c2a3d" stroke-width="1" />
    <circle cx="14" cy="13" r="3.5" fill="#ff2d95" />
    <circle cx="26" cy="13" r="3.5" fill="#ffb300" />
    <circle cx="38" cy="13" r="3.5" fill="#00e5ff" />
    <text class="mono" x="52" y="17" font-size="10" fill="#5d7290">top 3 anime</text>
    <text class="mono" x="16" y="62" font-size="12.5" fill="#c5d4e6"><tspan fill="#00e5ff">&gt;</tspan> Chainsaw Man</text>
    <text class="mono" x="16" y="96" font-size="12.5" fill="#c5d4e6"><tspan fill="#00e5ff">&gt;</tspan> One Piece</text>
    <text class="mono" x="16" y="130" font-size="12.5" fill="#c5d4e6"><tspan fill="#00e5ff">&gt;</tspan> Naruto</text>
  </g>

  <!-- panel: games -->
  <g transform="translate(308, 162)">
    <rect width="224" height="160" fill="#0a0e17" stroke="#1c2a3d" stroke-width="1" />
    <rect width="224" height="26" fill="#0e1420" stroke="#1c2a3d" stroke-width="1" />
    <circle cx="14" cy="13" r="3.5" fill="#ff2d95" />
    <circle cx="26" cy="13" r="3.5" fill="#ffb300" />
    <circle cx="38" cy="13" r="3.5" fill="#00e5ff" />
    <text class="mono" x="52" y="17" font-size="10" fill="#5d7290">top 3 games</text>
    <text class="mono" x="16" y="62" font-size="12.5" fill="#c5d4e6"><tspan fill="#ff2d95">&gt;</tspan> Final Fantasy VII</text>
    <text class="mono" x="16" y="96" font-size="12.5" fill="#c5d4e6"><tspan fill="#ff2d95">&gt;</tspan> Kingdom Hearts II</text>
    <text class="mono" x="16" y="130" font-size="12.5" fill="#c5d4e6"><tspan fill="#ff2d95">&gt;</tspan> Expedition 33</text>
  </g>

  <!-- panel: learning -->
  <g transform="translate(560, 162)">
    <rect width="224" height="160" fill="#0a0e17" stroke="#1c2a3d" stroke-width="1" />
    <rect width="224" height="26" fill="#0e1420" stroke="#1c2a3d" stroke-width="1" />
    <circle cx="14" cy="13" r="3.5" fill="#ff2d95" />
    <circle cx="26" cy="13" r="3.5" fill="#ffb300" />
    <circle cx="38" cy="13" r="3.5" fill="#00e5ff" />
    <text class="mono" x="52" y="17" font-size="10" fill="#5d7290">now learning</text>
    <text class="mono" x="16" y="62" font-size="12.5" fill="#c5d4e6"><tspan fill="#ffb300">&gt;</tspan> Personalized ML</text>
    <text class="mono" x="16" y="96" font-size="12.5" fill="#c5d4e6"><tspan fill="#ffb300">&gt;</tspan> Model Deployment</text>
    <text class="mono tag-blink" x="16" y="130" font-size="10" fill="#ffb300">[ IN_PROGRESS ]</text>
  </g>

  <!-- command line footer -->
  <text class="mono" x="56" y="370" font-size="11" fill="#5d7290"><tspan fill="#00e5ff">umair@khan</tspan><tspan fill="#3d5270">:~$</tspan> I like Machine Learning and Neurotech :)<tspan class="cursor" fill="#00e5ff">█</tspan></text>
</svg>
